<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Moto Story</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #ff6b35;
    --bg: #0d0d0f;
    --surface: #1a1a1e;
    --surface2: #242428;
    --text: #f0f0f0;
    --text-dim: #888;
    --radius: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 20px 24px 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    width: 32px; height: 32px;
    background: var(--orange);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  header span { font-size: 20px; font-weight: 300; color: var(--text-dim); }

  .container {
    width: 100%; max-width: 480px;
    padding: 24px 20px 40px;
    display: flex; flex-direction: column; gap: 20px;
  }

  /* ── Upload ── */
  .upload-zone {
    border: 1.5px dashed #444;
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center; cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--orange);
    background: rgba(255,107,53,.05);
  }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0;
    cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 36px; margin-bottom: 12px; }
  .upload-zone h2 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .upload-zone p { font-size: 13px; color: var(--text-dim); }

  /* ── Error ── */
  .error-msg {
    background: rgba(255,60,60,.1);
    border: 1px solid rgba(255,60,60,.3);
    border-radius: 12px; padding: 12px 16px;
    font-size: 14px; color: #ff6b6b; display: none;
  }

  /* ── Section title ── */
  .section-title {
    font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .8px;
    color: var(--text-dim); margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-title span { font-weight: 400; font-size: 12px; }

  /* ── Stat picker ── */
  .stat-picker {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .spc {
    background: var(--surface);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 10px 6px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s, opacity .15s;
    user-select: none;
  }
  .spc:active { transform: scale(.97); }
  .spc.selected {
    border-color: var(--orange);
    background: rgba(255,107,53,.08);
  }
  .spc.unavailable {
    opacity: .3; cursor: not-allowed;
  }
  .spc-icon  { font-size: 16px; margin-bottom: 3px; }
  .spc-val   { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.1; }
  .spc-unit  { font-size: 10px; font-weight: 400; color: var(--orange); margin-left: 1px; }
  .spc-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .4px; margin-top: 2px; }

  /* ── Preview ── */
  .preview-wrapper {
    position: relative;
    border-radius: var(--radius); overflow: hidden;
    background: var(--surface);
    aspect-ratio: 9/16;
    display: flex; align-items: center; justify-content: center;
  }
  .preview-wrapper::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(45deg,#2a2a2a 25%,transparent 25%),
      linear-gradient(-45deg,#2a2a2a 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#2a2a2a 75%),
      linear-gradient(-45deg,transparent 75%,#2a2a2a 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0;
  }
  .preview-placeholder {
    position: relative; z-index: 1;
    text-align: center; color: var(--text-dim); padding: 20px;
  }
  .preview-placeholder .icon { font-size: 40px; margin-bottom: 12px; }
  .preview-placeholder p { font-size: 14px; line-height: 1.5; }
  #preview-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain; display: none; z-index: 2;
  }

  /* ── Color picker ── */
  .color-picker { display: flex; gap: 10px; flex-wrap: wrap; }
  .color-swatch {
    width: 36px; height: 36px; border-radius: 50%;
    cursor: pointer; border: 3px solid transparent;
    transition: border-color .15s, transform .15s;
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active { border-color: white; }

  /* ── Layout picker ── */
  .layout-picker { display: flex; gap: 8px; }
  .layout-btn {
    flex: 1; padding: 8px 6px;
    background: var(--surface); border: 2px solid transparent;
    border-radius: 10px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    transition: border-color .15s, background .15s;
  }
  .layout-btn.active { border-color: var(--orange); background: rgba(255,107,53,.08); }
  .layout-preview {
    width: 22px; height: 36px;
    border-radius: 3px; overflow: hidden;
    position: relative; background: #111; border: 1px solid #333;
  }
  .lp-route { position: absolute; left: 0; right: 0; background: #2a2a2a; }
  .lp-panel { position: absolute; left: 0; right: 0; background: rgba(255,107,53,.6); }
  .layout-btn-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .4px; }

  /* ── Line width picker ── */
  .width-picker { display: flex; gap: 8px; }
  .width-btn {
    flex: 1; padding: 10px 6px;
    background: var(--surface); border: 2px solid transparent;
    border-radius: 10px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    transition: border-color .15s, background .15s;
  }
  .width-btn.active { border-color: var(--orange); background: rgba(255,107,53,.08); }
  .width-btn-line { background: white; border-radius: 99px; width: 28px; }
  .width-btn-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .4px; }

  /* ── Buttons ── */
  .actions { display: flex; flex-direction: column; gap: 10px; }
  button {
    width: 100%; padding: 16px; border: none;
    border-radius: var(--radius); font-size: 16px; font-weight: 600;
    cursor: pointer; transition: opacity .15s, transform .1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  button:active { transform: scale(.98); }
  button:disabled { opacity: .3; cursor: not-allowed; }
  button:disabled:active { transform: none; }
  .btn-primary  { background: var(--orange); color: white; }
  .btn-secondary { background: var(--surface2); color: var(--text); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #222; color: white;
    padding: 12px 20px; border-radius: 100px;
    font-size: 14px; font-weight: 500;
    opacity: 0; transition: opacity .2s, transform .2s;
    pointer-events: none; white-space: nowrap;
    z-index: 100; border: 1px solid #333;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">🏍</div>
  <h1>Moto <span>Story</span></h1>
</header>

<div class="container">

  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept=".gpx">
    <div class="upload-icon">📍</div>
    <h2>Importer un fichier GPX</h2>
    <p>Garmin Connect · Calimoto · Strava · Wikiloc<br>Glisse ou clique pour choisir</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <!-- Stat picker -->
  <div id="statPickerSection" style="display:none">
    <p class="section-title">
      Stats à afficher
      <span id="statCountLabel">0 / 3 sélectionnées</span>
    </p>
    <div class="stat-picker" id="statPicker"></div>
  </div>

  <!-- Preview -->
  <div class="preview-wrapper" id="previewWrapper">
    <div class="preview-placeholder" id="previewPlaceholder">
      <div class="icon">🗺️</div>
      <p>L'aperçu de ta story<br>apparaîtra ici</p>
    </div>
    <canvas id="preview-canvas"></canvas>
  </div>

  <!-- Color + width picker -->
  <div id="customizeSection" style="display:none">
    <p class="section-title">Couleur du tracé</p>
    <div class="color-picker" id="colorPicker">
      <div class="color-swatch active" style="background:#ff6b35" data-color="#ff6b35"></div>
      <div class="color-swatch" style="background:#00d4ff" data-color="#00d4ff"></div>
      <div class="color-swatch" style="background:#a855f7" data-color="#a855f7"></div>
      <div class="color-swatch" style="background:#22c55e" data-color="#22c55e"></div>
      <div class="color-swatch" style="background:#f59e0b" data-color="#f59e0b"></div>
      <div class="color-swatch" style="background:#ec4899" data-color="#ec4899"></div>
    </div>

    <p class="section-title" style="margin-top:16px">Position des stats</p>
    <div class="layout-picker" id="layoutPicker">
      <div class="layout-btn active" data-layout="bottom">
        <div class="layout-preview">
          <div class="lp-route" style="top:0;height:65%"></div>
          <div class="lp-panel" style="bottom:0;height:35%"></div>
        </div>
        <span class="layout-btn-label">En bas</span>
      </div>
      <div class="layout-btn" data-layout="top">
        <div class="layout-preview">
          <div class="lp-panel" style="top:0;height:35%"></div>
          <div class="lp-route" style="bottom:0;height:65%"></div>
        </div>
        <span class="layout-btn-label">En haut</span>
      </div>
      <div class="layout-btn" data-layout="minimal">
        <div class="layout-preview">
          <div class="lp-route" style="top:0;height:88%"></div>
          <div class="lp-panel" style="bottom:0;height:12%"></div>
        </div>
        <span class="layout-btn-label">Minimal</span>
      </div>
    </div>

    <p class="section-title" style="margin-top:16px">Épaisseur du tracé</p>
    <div class="width-picker" id="widthPicker">
      <div class="width-btn" data-width="4">
        <div class="width-btn-line" style="height:2px"></div>
        <span class="width-btn-label">Fin</span>
      </div>
      <div class="width-btn active" data-width="8">
        <div class="width-btn-line" style="height:4px"></div>
        <span class="width-btn-label">Normal</span>
      </div>
      <div class="width-btn" data-width="14">
        <div class="width-btn-line" style="height:7px"></div>
        <span class="width-btn-label">Épais</span>
      </div>
      <div class="width-btn" data-width="22">
        <div class="width-btn-line" style="height:11px"></div>
        <span class="width-btn-label">XL</span>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions" id="actionButtons" style="display:none">
    <button class="btn-primary" id="shareBtn">↑ Partager la story</button>
    <button class="btn-secondary" id="resetBtn">Nouvelle sortie</button>
  </div>

</div>

<div class="toast" id="toast"></div>
<canvas id="render-canvas" style="display:none"></canvas>

<script>
// ── Stat definitions ───────────────────────────────────────
const STAT_DEFS = [
  { id: 'dist',     label: 'Distance',    unit: 'km',   icon: '📍' },
  { id: 'avgSpeed', label: 'Vitesse moy.', unit: 'km/h', icon: '⚡️' },
  { id: 'maxSpeed', label: 'Vitesse max', unit: 'km/h', icon: '🚀' },
  { id: 'dur',      label: 'Durée',       unit: '',     icon: '⏱' },
  { id: 'elevGain', label: 'Dénivelé +',  unit: 'm',    icon: '📈' },
  { id: 'maxAlt',   label: 'Altitude max',unit: 'm',    icon: '⛰' },
  { id: 'avgHr',    label: 'FC moyenne',  unit: 'bpm',  icon: '❤️' },
  { id: 'maxHr',    label: 'FC max',      unit: 'bpm',  icon: '💓' },
  { id: 'avgCad',   label: 'Cadence',     unit: 'spm',  icon: '👟' },
];

// ── Constants ──────────────────────────────────────────────
const STORY_W = 1080;
const STORY_H = 1920;
const PADDING = 0.12;

// ── State ──────────────────────────────────────────────────
let currentPoints   = [];
let currentStats    = {};
let selectedStats   = ['dist', 'avgSpeed', 'dur'];
let traceColor      = '#ff6b35';
let lineWidth       = 8;
let layout          = 'bottom';
const renderCanvas  = document.getElementById('render-canvas');
const previewCanvas = document.getElementById('preview-canvas');

// ── GPX Parsing ────────────────────────────────────────────
function getExtVal(pt, name) {
  // Works regardless of namespace prefix by matching localName
  const all = pt.getElementsByTagName('*');
  for (const el of all) {
    if (el.localName === name) return parseFloat(el.textContent);
  }
  return null;
}

function parseGPX(text) {
  const xml = new DOMParser().parseFromString(text, 'text/xml');
  if (xml.querySelector('parsererror')) throw new Error('Fichier GPX invalide ou corrompu.');
  const trkpts = [...xml.querySelectorAll('trkpt')];
  if (trkpts.length < 2) throw new Error('Le fichier GPX doit contenir au moins 2 points de tracé.');

  return trkpts.map(pt => ({
    lat:  parseFloat(pt.getAttribute('lat')),
    lon:  parseFloat(pt.getAttribute('lon')),
    time: pt.querySelector('time') ? new Date(pt.querySelector('time').textContent) : null,
    ele:  pt.querySelector('ele')  ? parseFloat(pt.querySelector('ele').textContent) : null,
    hr:   getExtVal(pt, 'hr'),
    cad:  getExtVal(pt, 'cad'),
  }));
}

// ── Haversine ──────────────────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
  const Δφ = (lat2 - lat1) * Math.PI / 180;
  const Δλ = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

// ── Stats ──────────────────────────────────────────────────
function calcStats(points) {
  let totalDist = 0, movingMs = 0, maxSpeedKmh = 0;
  let elevGain = 0;
  const hrVals = [], cadVals = [], eleVals = [];

  for (let i = 1; i < points.length; i++) {
    const d = haversine(points[i-1].lat, points[i-1].lon, points[i].lat, points[i].lon);
    totalDist += d;

    if (points[i].time && points[i-1].time) {
      const dtMs = points[i].time - points[i-1].time;
      const dtH  = dtMs / 3600000;
      if (dtH > 0) {
        const spd = d / dtH;
        // Moving time: speed > 3 km/h; max speed: segment ≥ 2s to filter GPS noise
        if (spd > 3) movingMs += dtMs;
        if (dtMs >= 2000 && spd < 350) maxSpeedKmh = Math.max(maxSpeedKmh, spd);
      }
    }

    // Elevation gain (threshold 2m to filter barometer noise)
    if (points[i].ele !== null && points[i-1].ele !== null) {
      const diff = points[i].ele - points[i-1].ele;
      if (diff > 2) elevGain += diff;
    }
  }

  // HR & cadence averages
  for (const p of points) {
    if (p.ele !== null) eleVals.push(p.ele);
    if (p.hr  !== null) hrVals.push(p.hr);
    if (p.cad !== null && p.cad > 0) cadVals.push(p.cad);
  }

  const movingH  = movingMs / 3600000;
  const avgSpeed = movingH > 0.01 ? totalDist / movingH : null;
  const avg = arr => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : null;

  return {
    distKm:   Math.round(totalDist * 10) / 10,
    movingMs,
    avgSpeed: avgSpeed ? Math.round(avgSpeed)    : null,
    maxSpeed: maxSpeedKmh > 0 ? Math.round(maxSpeedKmh) : null,
    maxAlt:   eleVals.length ? Math.round(Math.max(...eleVals)) : null,
    elevGain: elevGain > 5   ? Math.round(elevGain) : null,
    avgHr:    hrVals.length  ? Math.round(avg(hrVals)) : null,
    maxHr:    hrVals.length  ? Math.round(Math.max(...hrVals)) : null,
    avgCad:   cadVals.length ? Math.round(avg(cadVals)) : null,
  };
}

function formatDuration(ms) {
  if (!ms || ms <= 0) return '—';
  const h   = Math.floor(ms / 3600000);
  const min = Math.floor((ms % 3600000) / 60000);
  if (h === 0)   return `${min}min`;
  if (min === 0) return `${h}h`;
  return `${h}h${String(min).padStart(2, '0')}`;
}

function getStatDisplay(id, stats) {
  const map = {
    dist:     { value: stats.distKm ?? '—',                         unit: 'km'   },
    dur:      { value: formatDuration(stats.movingMs),              unit: ''     },
    avgSpeed: { value: stats.avgSpeed ?? '—',                       unit: 'km/h' },
    maxSpeed: { value: stats.maxSpeed ?? '—',                       unit: 'km/h' },
    maxAlt:   { value: stats.maxAlt   ?? '—',                       unit: 'm'    },
    elevGain: { value: stats.elevGain ?? '—',                       unit: 'm'    },
    avgHr:    { value: stats.avgHr    ?? '—',                       unit: 'bpm'  },
    maxHr:    { value: stats.maxHr    ?? '—',                       unit: 'bpm'  },
    avgCad:   { value: stats.avgCad   ?? '—',                       unit: 'spm'  },
  };
  return map[id] ?? { value: '—', unit: '' };
}

function isAvailable(id, stats) {
  const v = stats[id];
  if (id === 'dist') return stats.distKm !== null && stats.distKm !== undefined;
  if (id === 'dur')  return stats.movingMs > 0;
  return v !== null && v !== undefined;
}

// ── Auto-select best stats ─────────────────────────────────
function autoSelect(stats) {
  const priority = ['dist', 'avgSpeed', 'maxSpeed', 'elevGain', 'maxAlt', 'avgHr', 'maxHr', 'dur', 'avgCad'];
  selectedStats = priority.filter(id => isAvailable(id, stats)).slice(0, 3);
  if (selectedStats.length === 0) selectedStats = ['dist'];
}

// ── Stat picker UI ─────────────────────────────────────────
function buildStatPicker(stats) {
  const picker = document.getElementById('statPicker');
  picker.innerHTML = '';

  for (const def of STAT_DEFS) {
    const avail    = isAvailable(def.id, stats);
    const selected = selectedStats.includes(def.id);
    const disp     = getStatDisplay(def.id, stats);

    const card = document.createElement('div');
    card.className = `spc${selected ? ' selected' : ''}${!avail ? ' unavailable' : ''}`;
    card.dataset.id = def.id;
    card.innerHTML = `
      <div class="spc-icon">${def.icon}</div>
      <div class="spc-val">${disp.value}<span class="spc-unit">${avail ? disp.unit : ''}</span></div>
      <div class="spc-label">${def.label}</div>
    `;
    if (avail) card.addEventListener('click', () => toggleStat(def.id, stats));
    picker.appendChild(card);
  }

  updateStatCountLabel();
}

function toggleStat(id, stats) {
  if (selectedStats.includes(id)) {
    if (selectedStats.length > 1) selectedStats = selectedStats.filter(s => s !== id);
    else showToast('Sélectionne au moins 1 stat');
  } else {
    if (selectedStats.length < 3) selectedStats.push(id);
    else showToast('Maximum 3 stats — désélectionne-en une d\'abord');
  }
  buildStatPicker(stats);
  if (currentPoints.length) updatePreview();
}

function updateStatCountLabel() {
  document.getElementById('statCountLabel').textContent = `${selectedStats.length} / 3 sélectionnées`;
}

// ── Canvas rendering ───────────────────────────────────────
function renderStory(points, stats, color) {
  renderCanvas.width  = STORY_W;
  renderCanvas.height = STORY_H;
  const ctx = renderCanvas.getContext('2d');
  ctx.clearRect(0, 0, STORY_W, STORY_H);

  // Layout areas
  let routeY, routeH, panelY, panelH;
  if (layout === 'top') {
    panelY = 0;              panelH = STORY_H * 0.28;
    routeY = panelH;         routeH = STORY_H - panelH;
  } else if (layout === 'minimal') {
    routeY = 0;              routeH = STORY_H;
    panelY = STORY_H * 0.88; panelH = STORY_H * 0.12;
  } else {
    routeY = 0;              routeH = STORY_H * 0.72;
    panelY = routeH;         panelH = STORY_H - routeH;
  }

  // Bounding box
  let minLat = Infinity, maxLat = -Infinity;
  let minLon = Infinity, maxLon = -Infinity;
  for (const p of points) {
    minLat = Math.min(minLat, p.lat); maxLat = Math.max(maxLat, p.lat);
    minLon = Math.min(minLon, p.lon); maxLon = Math.max(maxLon, p.lon);
  }

  // For minimal, shrink effective route area to avoid overlap with stats strip
  const effH  = layout === 'minimal' ? STORY_H * 0.84 : routeH;
  const pad   = Math.min(STORY_W, effH) * PADDING;
  const drawW = STORY_W - pad * 2;
  const drawH = effH - pad * 2;
  const scale = Math.min(drawW / (maxLon - minLon || .001), drawH / (maxLat - minLat || .001));
  const offX  = (STORY_W - (maxLon - minLon) * scale) / 2;
  const offY  = routeY + pad + (drawH - (maxLat - minLat) * scale) / 2;

  const toC = (lat, lon) => ({ x: offX + (lon - minLon) * scale, y: offY + (maxLat - lat) * scale });

  // Route (3-pass glow)
  for (const pass of [{ w: lineWidth * 5, a: .08 }, { w: lineWidth * 2.5, a: .18 }, { w: lineWidth, a: 1 }]) {
    ctx.beginPath();
    const f = toC(points[0].lat, points[0].lon);
    ctx.moveTo(f.x, f.y);
    for (let i = 1; i < points.length; i++) { const p = toC(points[i].lat, points[i].lon); ctx.lineTo(p.x, p.y); }
    ctx.strokeStyle = color; ctx.globalAlpha = pass.a;
    ctx.lineWidth = pass.w; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Start dot
  const sp = toC(points[0].lat, points[0].lon);
  ctx.beginPath(); ctx.arc(sp.x, sp.y, 14, 0, Math.PI*2); ctx.fillStyle = color; ctx.globalAlpha = .25; ctx.fill(); ctx.globalAlpha = 1;
  ctx.beginPath(); ctx.arc(sp.x, sp.y, 7, 0, Math.PI*2); ctx.fillStyle = color; ctx.fill();

  // Panel gradient
  let grad;
  if (layout === 'top') {
    grad = ctx.createLinearGradient(0, 0, 0, panelH + 80);
    grad.addColorStop(0, 'rgba(0,0,0,.82)');
    grad.addColorStop(.65, 'rgba(0,0,0,.65)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, STORY_W, panelH + 80);
  } else {
    const fade = layout === 'minimal' ? 50 : 80;
    grad = ctx.createLinearGradient(0, panelY - fade, 0, STORY_H);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(layout === 'minimal' ? .5 : .35, 'rgba(0,0,0,.65)');
    grad.addColorStop(1, 'rgba(0,0,0,.82)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, panelY - fade, STORY_W, panelH + fade);
  }

  // Stats
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  if (layout === 'minimal') {
    // Single compact line: "180km · 2h45 · 65 km/h"
    const line = selectedStats.map(id => {
      const def  = STAT_DEFS.find(d => d.id === id);
      const disp = getStatDisplay(id, stats);
      return disp.unit ? `${disp.value} ${disp.unit}` : String(disp.value);
    }).join('   ·   ');
    ctx.font = `600 ${Math.floor(STORY_W * .05)}px -apple-system, SF Pro Display, sans-serif`;
    ctx.fillStyle = 'white';
    ctx.fillText(line, STORY_W / 2, panelY + panelH / 2);
  } else {
    // Full column layout
    const count = selectedStats.length;
    const colW  = STORY_W / count;

    ctx.strokeStyle = 'rgba(255,255,255,.12)'; ctx.lineWidth = 1.5;
    for (let i = 1; i < count; i++) {
      ctx.beginPath();
      ctx.moveTo(colW * i, panelY + panelH * .18);
      ctx.lineTo(colW * i, panelY + panelH * .82);
      ctx.stroke();
    }

    for (let i = 0; i < count; i++) {
      const def  = STAT_DEFS.find(d => d.id === selectedStats[i]);
      const disp = getStatDisplay(def.id, stats);
      const x    = colW * i + colW / 2;

      ctx.font = `700 ${Math.floor(STORY_W * .085)}px -apple-system, SF Pro Display, sans-serif`;
      ctx.fillStyle = 'white';
      ctx.fillText(String(disp.value), x, panelY + panelH * .32);

      if (disp.unit) {
        ctx.font = `500 ${Math.floor(STORY_W * .038)}px -apple-system, SF Pro Display, sans-serif`;
        ctx.fillStyle = color;
        ctx.fillText(disp.unit, x, panelY + panelH * .52);
      }

      ctx.font = `400 ${Math.floor(STORY_W * .032)}px -apple-system, SF Pro Display, sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,.4)';
      ctx.fillText(def.label.toUpperCase(), x, panelY + panelH * .70);
    }

    const dotY = layout === 'top' ? panelY + panelH * .12 : panelY + panelH * .88;
    ctx.beginPath(); ctx.arc(STORY_W / 2, dotY, 4, 0, Math.PI*2); ctx.fillStyle = color; ctx.fill();
  }
}

function updatePreview() {
  renderStory(currentPoints, currentStats, traceColor);
  const wrapper = document.getElementById('previewWrapper');
  const scale = Math.min(wrapper.clientWidth / STORY_W, wrapper.clientHeight / STORY_H);
  previewCanvas.width  = STORY_W * scale;
  previewCanvas.height = STORY_H * scale;
  const ctx = previewCanvas.getContext('2d');
  ctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
  ctx.drawImage(renderCanvas, 0, 0, previewCanvas.width, previewCanvas.height);
  previewCanvas.style.display = 'block';
}

// ── File handling ──────────────────────────────────────────
function handleFile(file) {
  if (!file || !file.name.toLowerCase().endsWith('.gpx')) {
    showError('Merci de choisir un fichier .gpx'); return;
  }
  hideError();
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const points = parseGPX(e.target.result);
      const stats  = calcStats(points);
      currentPoints = points;
      currentStats  = stats;

      autoSelect(stats);
      buildStatPicker(stats);

      document.getElementById('statPickerSection').style.display = 'block';
      document.getElementById('customizeSection').style.display  = 'block';
      document.getElementById('actionButtons').style.display     = 'flex';
      document.getElementById('previewPlaceholder').style.display = 'none';

      updatePreview();
    } catch (err) { showError(err.message); }
  };
  reader.readAsText(file);
}

// ── Upload zone ────────────────────────────────────────────
const uploadZone = document.getElementById('uploadZone');
const fileInput  = document.getElementById('fileInput');

fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});

// ── Color picker ───────────────────────────────────────────
document.getElementById('colorPicker').addEventListener('click', e => {
  const sw = e.target.closest('.color-swatch');
  if (!sw) return;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  sw.classList.add('active');
  traceColor = sw.dataset.color;
  if (currentPoints.length) updatePreview();
});

document.getElementById('layoutPicker').addEventListener('click', e => {
  const btn = e.target.closest('.layout-btn');
  if (!btn) return;
  document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  layout = btn.dataset.layout;
  if (currentPoints.length) updatePreview();
});

document.getElementById('widthPicker').addEventListener('click', e => {
  const btn = e.target.closest('.width-btn');
  if (!btn) return;
  document.querySelectorAll('.width-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  lineWidth = parseInt(btn.dataset.width);
  if (currentPoints.length) updatePreview();
});

// ── Share ──────────────────────────────────────────────────
document.getElementById('shareBtn').addEventListener('click', async () => {
  if (!currentPoints.length) return;
  renderStory(currentPoints, currentStats, traceColor);
  renderCanvas.toBlob(async blob => {
    const file = new File([blob], 'moto-story.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file], title: 'Ma sortie' }); return; }
      catch (err) { if (err.name === 'AbortError') return; }
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'moto-story.png'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('Image téléchargée ✓');
  }, 'image/png');
});

// ── Reset ──────────────────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', () => {
  currentPoints = []; currentStats = {};
  fileInput.value = '';
  ['statPickerSection','customizeSection','actionButtons'].forEach(id =>
    document.getElementById(id).style.display = 'none'
  );
  document.getElementById('previewPlaceholder').style.display = 'block';
  previewCanvas.style.display = 'none';
  hideError();
});

// ── Helpers ────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() { document.getElementById('errorMsg').style.display = 'none'; }

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
